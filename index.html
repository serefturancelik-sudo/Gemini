<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gemini Canvas OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-white min-h-screen p-6">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-3xl font-bold text-blue-500 mb-4">Gemini Canvas OS</h1>
        <div class="bg-neutral-900 p-6 rounded-xl border border-neutral-800">
            <textarea id="promptArea" class="w-full h-32 bg-black p-4 rounded-lg border border-neutral-700 mb-4" placeholder="Ne yapmak istiyorsun?"></textarea>
            <button onclick="generate()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Üret</button>
            <pre id="canvas" class="mt-6 text-left bg-black p-4 text-green-400 font-mono">Kod burada çıkacak...</pre>
        </div>
    </div>
    <script>
        function generate() {
            const p = document.getElementById('promptArea').value;
            document.getElementById('canvas').innerText = "// Üretiliyor: " + p + "\n\nvoid setup() { Serial.begin(9600); }\nvoid loop() {}";
        }
    </script>
</body>
</html>
